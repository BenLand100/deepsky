  <title>Ben's Deep Sky</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; color: #eee; font-family: system-ui, sans-serif; }
    #app { position: relative; width: 100%; height: 100%; }
    #hud { position: absolute; inset: 0; pointer-events: none; }
    #status { position: absolute; left: 12px; bottom: 12px; max-width: 520px; padding: 8px 10px; background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; font-size: 13px; pointer-events: auto; z-index: 20; }
    #panel { position: absolute; top: 12px; right: 12px; width: min(380px, calc(100vw - 24px)); max-height: calc(100vh - 24px); overflow: auto; padding: 14px; background: rgba(0,0,0,.7); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; backdrop-filter: blur(10px); display: none; pointer-events: auto; z-index: 1000; }
    #panel img { width: 100%; height: auto; display: block; margin-top: 10px; border-radius: 8px; background: #111; }
    #panel h2 { margin: 0 0 8px; font-size: 18px; }
    #panel dl { margin: 10px 0 0; display: grid; grid-template-columns: max-content 1fr; gap: 6px 10px; font-size: 13px; }
    #panel dt { color: #aaa; }
    #zoomPanel { position: absolute; top: 12px; right: 12px; width: min(380px, calc(100vw - 24px)); max-height: calc(100vh - 24px); overflow: auto; padding: 14px; background: rgba(0,0,0,.7); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; backdrop-filter: blur(10px); pointer-events: auto; z-index: 1000; }
    #zoomPanel dl { margin: 10px 0 0; display: grid; grid-template-columns: max-content 1fr; gap: 6px 10px; font-size: 13px; }
    #zoomPanel dt { color: #aaa; }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
    }

    #overlay h2 { margin: 0 0 8px; margin-right: auto; font-size: 24px; }

    #overlayBackdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.82);
      backdrop-filter: blur(4px);
    }

    #overlayContent {
      position: absolute;
      inset: 24px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      pointer-events: auto;
    }

    #overlayWindow {
      position: relative;
      max-width: 100%;
      margin: 0 auto;
      width: 98%;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      padding: 14px;
      color: #eee;
      pointer-events: auto;
    }

    #overlayClose {
      z-index: 2000;
    }

    .zoom-wrap {
      position: relative;
      width: 100%;
      height: 85vh;
      overflow: hidden;
      border-radius: 8px;
      background: #111;
      touch-action: none;
    }
    .zoom-stage {
      width: 100%;
      height: 100%;
      transform-origin: 0 0;
      will-change: transform;
      cursor: grab;
    }
    .zoom-stage.dragging {
      cursor: grabbing;
    }
    .zoom-stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .zoom-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 0;
    }
    .zoom-toolbar button {
      background: #222;
      color: #eee;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      padding: 6px 10px;
    }
    .zoom-hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 6px;
    }

    .label { color: #fff; font: 12px/1.2 system-ui, sans-serif; text-shadow: 0 0 8px rgba(0,0,0,.95); white-space: nowrap; pointer-events: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
      "three/": "https://unpkg.com/three@0.180.0/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="panel"></div>
      <div id="status">Loading…</div>
    </div>
    <div id="overlay" style="display:none;">
      <div id="overlayBackdrop"></div>
      <div id="overlayContent"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/examples/jsm/renderers/CSS2DRenderer.js';

    const CSV_URL = './live_images.csv';
    const IMAGE_BASE_URL = './images';
    const THUMB_BASE_URL = './thumbs';
    const PATCH_BASE_URL = './patches';
    const SKY_URL = './starmap.jpg';
    const SKY_RADIUS = 850;

    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');
    const panelEl = document.getElementById('panel');
    const overlayEl = document.getElementById('overlay');
    const overlayContentEl = document.getElementById('overlayContent');


    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(0, 0, 0.1);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping;
    app.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    app.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.rotateSpeed = -0.35;
    controls.enableZoom = false;
    controls.minDistance = 0.02;
    controls.maxDistance = 3.0;
    controls.enableDamping = true;

    const textureLoader = new THREE.TextureLoader();
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const patchGroup = new THREE.Group();
    scene.add(patchGroup);
    const clickable = [];

    const overlayGroup = new THREE.Group();
    scene.add(overlayGroup);

    function makeLine(points, color=0x2f7fbf, opacity=0.35) {
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity, toneMapped: false });
      return new THREE.Line(geom, mat);
    }

    function raDecToVec3Overlay(raDeg, decDeg, radius = SKY_RADIUS + 2) {
      const ra = THREE.MathUtils.degToRad(Number(raDeg));
      const dec = THREE.MathUtils.degToRad(Number(decDeg));
      return new THREE.Vector3(
        radius * Math.cos(dec) * Math.cos(ra),
        radius * Math.sin(dec),
        radius * Math.cos(dec) * Math.sin(ra)
      );
    }

    function buildRaDecOverlay() {
      const raStep = 30;
      const decStep = 15;
      const decMin = -75;
      const decMax = 75;
      const sampleStep = 2;

      for (let ra = 0; ra < 360; ra += raStep) {
        const pts = [];
        for (let dec = -89; dec <= 89; dec += sampleStep) {
          pts.push(raDecToVec3Overlay(ra, dec));
        }
        overlayGroup.add(makeLine(pts, 0x4ea1ff, 0.28));

        const labelEl = document.createElement('div');
        labelEl.className = 'label';
        labelEl.textContent = `${String(Math.round(ra / 15)).padStart(2, '0')}h`;
        labelEl.style.color = '#8fc6ff';
        const label = new CSS2DObject(labelEl);
        label.position.copy(raDecToVec3Overlay(ra, 0, SKY_RADIUS + 20));
        overlayGroup.add(label);
      }

      for (let dec = decMin; dec <= decMax; dec += decStep) {
        const pts = [];
        for (let ra = 0; ra <= 360; ra += sampleStep) {
          pts.push(raDecToVec3Overlay(ra, dec));
        }
        overlayGroup.add(makeLine(pts, 0x6ee7b7, 0.22));

        const labelEl = document.createElement('div');
        labelEl.className = 'label';
        labelEl.textContent = `${dec > 0 ? '+' : ''}${dec}°`;
        labelEl.style.color = '#9af0cc';
        const label = new CSS2DObject(labelEl);
        label.position.copy(raDecToVec3Overlay(0, dec, SKY_RADIUS + 20));
        overlayGroup.add(label);
      }
    }

    const skyGeo = new THREE.SphereGeometry(1000, 64, 32);
    const skyTex = textureLoader.load(SKY_URL);
    skyTex.colorSpace = THREE.SRGBColorSpace;
    const skyMat = new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide, toneMapped: false });
    const skyMesh = new THREE.Mesh(skyGeo, skyMat);
    scene.add(skyMesh);

    function setStatus(msg) { statusEl.textContent = msg; }
    function basename(path) { return String(path).split(/[\\/]/).pop(); }

    function parseCsvSimple(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];
        if (c === '"') {
          if (inQuotes && next === '"') { field += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (c === ',' && !inQuotes) {
          row.push(field); field = '';
        } else if ((c === '\n' || c === '\r') && !inQuotes) {
          if (c === '\r' && next === '\n') i++;
          row.push(field); field = '';
          if (row.length > 1 || row[0] !== '') rows.push(row);
          row = [];
        } else {
          field += c;
        }
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      if (!rows.length) return [];
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(cols => {
        const obj = {};
        headers.forEach((h, idx) => obj[h] = (cols[idx] ?? '').trim());
        return obj;
      });
    }

    async function loadCsv(url) {
      const text = await fetch(url).then(r => {
        if (!r.ok) throw new Error(`Failed to load CSV: ${r.status}`);
        return r.text();
      });
      return parseCsvSimple(text);
    }

    function deriveImageUrl(row) {
      return `${IMAGE_BASE_URL}/${basename(row.file)}`;
    }

    function deriveThumbUrl(row) {
      return `${THUMB_BASE_URL}/${basename(row.file)}`;
    }

    function derivePatchUrl(row) {
      if (row.patch_json_file) return `${PATCH_BASE_URL}/${basename(row.patch_json_file)}`;
      return `${PATCH_BASE_URL}/${basename(row.file).replace(/\.[^.]+$/, '')}.patch.json`;
    }

    function radecToVec3(raDeg, decDeg, radius = SKY_RADIUS) {
      const ra = THREE.MathUtils.degToRad(Number(raDeg));
      const dec = THREE.MathUtils.degToRad(Number(decDeg));
      return new THREE.Vector3(
        radius * Math.cos(dec) * Math.cos(ra),
        radius * Math.sin(dec),
        radius * Math.cos(dec) * Math.sin(ra)
      );
    }

    function buildPatchGeometry(patchData, radius = SKY_RADIUS) {
      const samples = patchData.samples;
      const grid = patchData.grid;
      const cols = grid + 1;
      const rows = grid + 1;

      const positions = [];
      const uvs = [];
      const indices = [];

      for (const s of samples) {
        const v = radecToVec3(s.ra_deg, s.dec_deg, radius);
        positions.push(v.x, v.y, v.z);
        uvs.push(s.u, s.v);
      }

      for (let y = 0; y < rows - 1; y++) {
        for (let x = 0; x < cols - 1; x++) {
          const a = y * cols + x;
          const b = a + 1;
          const c = a + cols;
          const d = c + 1;
          indices.push(a, c, b);
          indices.push(b, c, d);
        }
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geom.setIndex(indices);
      geom.computeVertexNormals();
      geom.computeBoundingSphere();
      return geom;
    }

    function clearPatches() {
      clickable.length = 0;
      patchGroup.clear();
    }

    async function addPatch(row) {
      const [patchData, tex] = await Promise.all([
        fetch(derivePatchUrl(row)).then(r => {
          if (!r.ok) throw new Error(`Patch JSON not found for ${row.file}`);
          return r.json();
        }),
        textureLoader.loadAsync(deriveThumbUrl(row))
      ]);

      tex.colorSpace = THREE.SRGBColorSpace;
      const geom = buildPatchGeometry(patchData, SKY_RADIUS * (1 - row.zOffset));
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        side: THREE.DoubleSide,
        toneMapped: false,
        depthWrite: true,
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.userData = row;

      // Glowing border
      const edges = new THREE.EdgesGeometry(geom, 30);
      const edgeMat = new THREE.LineBasicMaterial({
        color: 0x00ffff,
        linewidth: 2,
        transparent: true,
        opacity: 0.8,
        toneMapped: false
      });
      const edgesMesh = new THREE.LineSegments(edges, edgeMat);
      edgesMesh.userData = row;
      mesh.add(edgesMesh);
      patchGroup.add(mesh);
      clickable.push(mesh);

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = basename(row.file);
      //const label = new CSS2DObject(labelEl);
      //label.position.copy(radecToVec3(row.center_ra_deg, row.center_dec_deg, SKY_RADIUS + 8));
      //patchGroup.add(label);
      //mesh.userData._label = label;
    }

    function rowTitle(row) {
      const catalog = row.catalog_identifier || '';
      const common = row.common_name || '';
      return catalog && common ? `${catalog} - ${common}` : (catalog || common || basename(row.file));
    }

    function panelHtml(row) {

      let RAhours = parseFloat(row.center_ra_deg) / 15;
      let RAminutes = Math.floor((RAhours - Math.floor(RAhours)) * 60);
      RAhours = Math.floor(RAhours);

      // New title format
      const title = rowTitle(row);

      // Helper to format exposure: e.g., "10 x 2.40 (24m)" -> "10 x 2m24s (24m)"
      function formatExposure(totalImages, totalExptime) {
        if (!totalImages || !totalExptime) return '';
        const frames = parseInt(totalImages);
        const totalMin = parseFloat(totalExptime) / 60;
        const hours = Math.floor(totalMin / 60);
        const mins = Math.floor(totalMin % 60);
        const expPerFrameMin = totalMin / frames;
        const expHours = Math.floor(expPerFrameMin / 60);
        const expMins = Math.floor((expPerFrameMin % 60));
        const expStr = `${expHours ? expHours + 'h' : ''}${expMins}m`;
        const totalStr = hours ? `${hours}h${mins}m` : `${mins}m`;
        return `${frames} x ${expStr} (${totalStr})`;
      }

      // Collect exposure details
      const exposures = [];
      const filters = [
        {key: 'OSC', images: 'OSC total images', exptime: 'OSC exptime'},
        {key: 'L', images: 'L total images', exptime: 'L exptime'},
        {key: 'R', images: 'R total images', exptime: 'R exptime'},
        {key: 'G', images: 'G total images', exptime: 'G exptime'},
        {key: 'B', images: 'B total images', exptime: 'B exptime'},
        {key: 'Sii', images: 'Sii total images', exptime: 'Sii exptime'},
        {key: 'Ha', images: 'Ha total images', exptime: 'Ha exptime'},
        {key: 'Oiii', images: 'Oiii total images', exptime: 'Oiii exptime'}
      ];
      filters.forEach(f => {
        const exp = formatExposure(row[f.images], row[f.exptime]);
        if (exp) exposures.push(`${f.key}: ${exp}`);
      });

      return `
        <dl>
          <dt>Camera</dt><dd>${row.Camera || ''}</dd>
          <dt>Telescope</dt><dd>${row.Telescope || ''}</dd>
          <dt>Image Type</dt><dd>${row['Image Type'] || 'Other'}${row['OSC filter'] ? (" - " + row['OSC filter']) : ""}</dd>
          ${exposures.length ? exposures.map(exp => `<dt>${exp.split(': ')[0]}</dt><dd>${exp.split(': ')[1]}</dd>`).join('') : ''}
          <dt>RA/Dec</dt><dd>${RAhours}h${RAminutes.toString().padStart(2,'0')}m ${parseFloat(row.center_dec_deg).toFixed(1)}°</dd>
          <dt>Size</dt><dd>${(parseFloat(row.extent_width_deg)*60).toFixed(1)} x ${(parseFloat(row.extent_height_deg)*60).toFixed(1)} arcmin</dd>
          <dt>Pixel Scale</dt><dd>${parseFloat(row.pixscale_arcsec_per_px).toFixed(2)} arcsec/px</dd>
          <dt>Processed on</dt><dd>${row.mtime ? row.mtime.split('T')[0] : 'N/A'}</dd>
          <dt>Filename</dt><dd>${basename(row.file)}</dd>
        </dl>
      `;
    }

    function showPanel(row) {
      const title  = rowTitle(row);
      panelEl.style.display = 'block';
      panelEl.innerHTML = `
        <h2>${title}</h2>
        ${panelHtml(row)}
        <img src="${deriveThumbUrl(row)}" alt="${title}">
      `;
    }

    function hidePanel(row) {
      panelEl.style.display = 'none';
      panelEl.innerHTML = '';
    }

    function expandedView(row) {
      overlayEl.style.display = 'block';
      overlayContentEl.innerHTML = `
        <div id="overlayWindow">
          <div class="zoom-toolbar">
            <h2>${rowTitle(row)}</h2>
            <button id="zoomReset">Reset</button>
            <button id="zoomOut">-</button>
            <button id="zoomIn">+</button>
            <button id="overlayClose">Close</button>
          </div>
          <div class="zoom-wrap" id="zoomWrap">
            <div id="zoomPanel">
            ${panelHtml(row)}
            </div>
            <div class="zoom-stage" id="zoomStage">
              <img src="${deriveImageUrl(row)}" alt="${basename(row.file)}">
            </div>
          </div>
          <div class="zoom-hint">Wheel to zoom, drag to pan, double-click to reset.</div>
        </div>
      `;

      overlayContentEl.querySelector('#overlayClose').onclick = () => {
        overlayEl.style.display = 'none';
      };

      const wrap = overlayEl.querySelector('#zoomWrap');
      const stage = overlayEl.querySelector('#zoomStage');

      let scale = 1, x = 0, y = 0;
      let dragging = false, sx = 0, sy = 0, startX = 0, startY = 0;

      const apply = () => {
        stage.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      };

      const reset = () => {
        scale = 1;
        x = 0;
        y = 0;
        apply();
      };

      const zoomAt = (factor, clientX, clientY) => {
        const rect = wrap.getBoundingClientRect();
        const px = clientX - rect.left;
        const py = clientY - rect.top;

        const nextScale = Math.min(8, Math.max(1, scale * factor));
        const k = nextScale / scale;

        x = px - (px - x) * k;
        y = py - (py - y) * k;
        scale = nextScale;
        apply();
      };

      stage.addEventListener('pointerdown', e => {
        dragging = true;
        stage.classList.add('dragging');
        stage.setPointerCapture(e.pointerId);
        sx = e.clientX;
        sy = e.clientY;
        startX = x;
        startY = y;
      });

      stage.addEventListener('pointermove', e => {
        if (!dragging) return;
        x = startX + (e.clientX - sx);
        y = startY + (e.clientY - sy);
        apply();
      });

      stage.addEventListener('pointerup', e => {
        dragging = false;
        stage.classList.remove('dragging');
        try { stage.releasePointerCapture(e.pointerId); } catch {}
      });

      stage.addEventListener('pointercancel', () => {
        dragging = false;
        stage.classList.remove('dragging');
      });

      wrap.addEventListener('wheel', e => {
        e.preventDefault();
        zoomAt(e.deltaY > 0 ? 0.9 : 1.1, e.clientX, e.clientY);
      }, { passive: false });

      stage.addEventListener('dblclick', reset);

      overlayEl.querySelector('#zoomReset').onclick = reset;
      overlayEl.querySelector('#zoomIn').onclick = () => {
        const r = wrap.getBoundingClientRect();
        zoomAt(1.25, r.left + r.width / 2, r.top + r.height / 2);
      };
      overlayEl.querySelector('#zoomOut').onclick = () => {
        const r = wrap.getBoundingClientRect();
        zoomAt(0.8, r.left + r.width / 2, r.top + r.height / 2);
      };

      apply();
    }

    function showAllPatches() {
      for (const mesh of clickable) {
        mesh.visible = true;
        if (mesh.userData._label) mesh.userData._label.visible = true;
      }
      setStatus(`Showing ${clickable.length} patches`);
    }

    let hoveredMeshes = [], cycleIndex = 0;

    function refreshHoverPromotion() {
      clickable.forEach(m => {
        m.scale.setScalar(1.0);
      });

      if (!hoveredMeshes.length) {
        hidePanel();
        return;
      }

      const index = cycleIndex % (hoveredMeshes.length + 1)
      if (index > 0) {
        showPanel(hoveredMeshes[index-1].object.userData);
        hoveredMeshes[index-1].object.scale.setScalar(0.75);
      } else {
        showPanel(hoveredMeshes[hoveredMeshes.length-1].object.userData);
      }
    }

    setInterval(() => {
      if (hoveredMeshes.length < 1) return;
      cycleIndex = (cycleIndex + 1) % (hoveredMeshes.length+1);
      refreshHoverPromotion();
    }, 1500);

    let pressX = 0, pressY = 0;
    let didDrag = false;
    const DRAG_THRESHOLD = 6; // pixels

    function onPointerDown(event) {
      pressX = event.clientX;
      pressY = event.clientY;
      didDrag = false;
    }

    function onPointerMove(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      const dx = event.clientX - pressX;
      const dy = event.clientY - pressY;
      if ((dx * dx + dy * dy) > DRAG_THRESHOLD * DRAG_THRESHOLD) {
        didDrag = true;
      }

      raycaster.setFromCamera(pointer, camera);
      let unsortMeshes = raycaster.intersectObjects(clickable);
      unsortMeshes.sort((a, b) => {
        const sizeA = parseFloat(a.object.userData.extent_width_deg || 0) * parseFloat(a.object.userData.extent_height_deg || 0);
        const sizeB = parseFloat(b.object.userData.extent_width_deg || 0) * parseFloat(b.object.userData.extent_height_deg || 0);
        return sizeB - sizeA;
      });
      hoveredMeshes = unsortMeshes;

      refreshHoverPromotion();
    }

    function onClick(event) {
      if (didDrag) return;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickable);
      if (!hits.length) return;
      hoveredMeshes = [];
      expandedView(hits[0].object.userData);
    }

    async function reloadCatalog() {
      setStatus('Loading CSV...');
      panelEl.style.display = 'none';
      clearPatches();
      try {
        const rows = await loadCsv(CSV_URL);
        let solved = rows.filter(r => r.solve_status === 'solved' && r.patch_json_file);
        setStatus(`Loading ${solved.length} curved patches...`);

        // Sort by angular area descending (larger/deeper)
        solved.sort((a, b) => {
          const sizeA = parseFloat(a.extent_width_deg || 0) * parseFloat(a.extent_height_deg || 0);
          const sizeB = parseFloat(b.extent_width_deg || 0) * parseFloat(b.extent_height_deg || 0);
          return sizeB - sizeA;
        });

        let rank = 0;
        for (const row of solved) {
          // zOffset: rank-based depth + deterministic tie-breaker
          row.zOffset = rank / (solved.length * 4);
          try {
            await addPatch(row);
          } catch (err) {
            console.warn('Skipping patch', row.file, err);
          }
          rank++;
        }
        showAllPatches();
        setStatus(`Showing ${clickable.length} patches`);
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`);
      }
    }

    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('click', onClick);
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    function onWheel(event) {
      event.preventDefault();
      const zoomFactor = event.deltaY > 0 ? 1.08 : 0.92;
      camera.fov = THREE.MathUtils.clamp(camera.fov * zoomFactor, 1, 100);
      camera.updateProjectionMatrix();
      controls.rotateSpeed = THREE.MathUtils.clamp(camera.fov / 50 * -0.35, -0.75, -0.001);
    }

    renderer.domElement.addEventListener('wheel', onWheel, { passive: false });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    buildRaDecOverlay();
    reloadCatalog();
    animate();
  </script>
</body>
</html>
